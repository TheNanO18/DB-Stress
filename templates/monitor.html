<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CUBRID Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e; color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif; padding: 16px;
        }
        h1 { text-align: center; margin-bottom: 12px; font-size: 20px; color: #00d4aa; }
        .status-bar {
            text-align: center; margin-bottom: 16px; font-size: 13px; color: #888;
        }
        .status-bar .mode { color: #00d4aa; font-weight: bold; }
        .status-bar .time { color: #aaa; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: #16213e; border-radius: 8px;
            padding: 12px; border: 1px solid #0f3460;
        }
        .card h3 {
            font-size: 13px; color: #00d4aa; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card h3 .value {
            font-size: 14px; color: #fff; font-weight: bold;
        }
        canvas { width: 100% !important; height: 180px !important; }
        .back-link {
            display: block; text-align: center; margin-top: 16px;
            color: #00d4aa; text-decoration: none; font-size: 13px;
        }
        .back-link:hover { text-decoration: underline; }
        .export-bar {
            text-align: center; margin-bottom: 16px;
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
        .export-btn {
            background: #0f3460; color: #00d4aa; border: 1px solid #00d4aa;
            padding: 6px 14px; border-radius: 4px; cursor: pointer;
            font-size: 12px; font-family: inherit; transition: background 0.2s;
        }
        .export-btn:hover { background: #1a4a7a; }
        .card h3 .dl-icon {
            cursor: pointer; font-size: 14px; opacity: 0.5; transition: opacity 0.2s;
            margin-left: 6px; color: #aaa;
        }
        .card h3 .dl-icon:hover { opacity: 1; color: #00d4aa; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>CUBRID Stress Monitor</h1>
    <div class="status-bar">
        Mode: <span class="mode" id="mode">-</span>
        &nbsp;|&nbsp;
        Last update: <span class="time" id="lastUpdate">-</span>
    </div>

    <div class="export-bar">
        <button class="export-btn" onclick="exportExcel()">&#128202; Excel 다운로드</button>
        <button class="export-btn" onclick="exportCSV()">&#128196; CSV 다운로드</button>
        <button class="export-btn" onclick="exportAllCharts()">&#128247; 전체 그래프 PNG 다운로드</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>CPU Usage <span class="value" id="cpuVal">-</span><span class="dl-icon" onclick="downloadChart('cpuChart','cpu')" title="PNG 저장">&#11015;</span></h3>
            <canvas id="cpuChart"></canvas>
        </div>
        <div class="card">
            <h3>Memory Usage <span class="value" id="memVal">-</span><span class="dl-icon" onclick="downloadChart('memChart','memory')" title="PNG 저장">&#11015;</span></h3>
            <canvas id="memChart"></canvas>
        </div>
        <div class="card">
            <h3>Disk I/O (KB/s) <span class="value" id="diskVal">-</span><span class="dl-icon" onclick="downloadChart('diskChart','disk_io')" title="PNG 저장">&#11015;</span></h3>
            <canvas id="diskChart"></canvas>
        </div>
        <div class="card">
            <h3>DB Response Probe <span class="value" id="rtVal">-</span><span class="dl-icon" onclick="downloadChart('rtChart','response_time')" title="PNG 저장">&#11015;</span></h3>
            <canvas id="rtChart"></canvas>
        </div>
        <div class="card">
            <h3>Table Row Count <span class="value" id="rowVal">-</span><span class="dl-icon" onclick="downloadChart('rowChart','row_count')" title="PNG 저장">&#11015;</span></h3>
            <canvas id="rowChart"></canvas>
        </div>
        <div class="card">
            <h3>Transactions / Locks <span class="value" id="txVal">-</span><span class="dl-icon" onclick="downloadChart('txChart','transactions')" title="PNG 저장">&#11015;</span></h3>
            <canvas id="txChart"></canvas>
        </div>
    </div>

    <a class="back-link" href="/">&#8592; Back to Locust Dashboard</a>

<script>
const CHART_OPTS = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 0 },
    scales: {
        x: { display: true, ticks: { color: '#666', font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { color: '#888', font: { size: 10 } }, grid: { color: '#1f3366' } }
    },
    plugins: { legend: { display: false } },
    elements: { point: { radius: 0 }, line: { borderWidth: 1.5 } }
};

function makeChart(id, datasets, showLegend) {
    const ctx = document.getElementById(id).getContext('2d');
    const opts = JSON.parse(JSON.stringify(CHART_OPTS));
    if (showLegend) {
        opts.plugins.legend = { display: true, labels: { color: '#aaa', font: { size: 10 } } };
    }
    return new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets },
        options: opts
    });
}

function ds(label, color) {
    return { label, data: [], borderColor: color, backgroundColor: color + '20', fill: true, tension: 0.3 };
}

// 컨테이너별 색상 팔레트
const COLORS = ['#ff6384', '#36a2eb', '#ff9f40', '#4bc0c0', '#9966ff', '#ffcd56'];

// 초기 차트 (단일 모드 — 멀티 컨테이너 감지 시 동적 교체)
let cpuChart = makeChart('cpuChart', [ds('CPU %', '#ff6384')], false);
let memChart = makeChart('memChart', [ds('Memory %', '#36a2eb')], false);
const diskChart = makeChart('diskChart', [ds('Read', '#4bc0c0'), ds('Write', '#ff9f40')], true);
const rtChart = makeChart('rtChart', [ds('Response (ms)', '#9966ff')], false);
const rowChart = makeChart('rowChart', [ds('Rows', '#ffcd56')], false);
const txChart = makeChart('txChart', [ds('Active TX', '#4bc0c0'), ds('Lock Waiters', '#ff6384')], true);

let multiMode = false;
let cLabels = [];

function formatTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString('ko-KR', { hour12: false });
}

function last(arr) { return arr.length ? arr[arr.length - 1] : 0; }

function initMultiCharts(labels) {
    if (multiMode) return;
    multiMode = true;
    cLabels = labels;

    // CPU 차트를 멀티라인으로 재생성
    cpuChart.destroy();
    cpuChart = makeChart('cpuChart',
        labels.map((l, i) => ds(l, COLORS[i % COLORS.length])), true);

    // Memory 차트를 멀티라인으로 재생성
    memChart.destroy();
    memChart = makeChart('memChart',
        labels.map((l, i) => ds(l, COLORS[i % COLORS.length])), true);
}

async function fetchData() {
    try {
        const resp = await fetch('/monitor/data');
        const d = await resp.json();
        const labels = d.timestamps.map(formatTime);

        // 멀티 컨테이너 모드 감지
        if (d.container_labels && d.container_labels.length > 1 && !multiMode) {
            initMultiCharts(d.container_labels);
        }

        // --- CPU ---
        cpuChart.data.labels = labels;
        if (multiMode) {
            const parts = [];
            cLabels.forEach((label, i) => {
                const key = 'cpu_' + label;
                cpuChart.data.datasets[i].data = d[key] || [];
                parts.push(label + ':' + last(d[key] || []).toFixed(1) + '%');
            });
            document.getElementById('cpuVal').textContent = parts.join(' | ');
        } else {
            cpuChart.data.datasets[0].data = d.cpu_percent;
            document.getElementById('cpuVal').textContent = last(d.cpu_percent).toFixed(1) + '%';
        }
        cpuChart.update();

        // --- Memory ---
        memChart.data.labels = labels;
        if (multiMode) {
            const parts = [];
            cLabels.forEach((label, i) => {
                const key = 'mem_' + label;
                memChart.data.datasets[i].data = d[key] || [];
                parts.push(label + ':' + last(d[key] || []).toFixed(1) + '%');
            });
            document.getElementById('memVal').textContent = parts.join(' | ');
        } else {
            memChart.data.datasets[0].data = d.memory_percent;
            document.getElementById('memVal').textContent = last(d.memory_percent).toFixed(1) + '%';
        }
        memChart.update();

        // --- Disk I/O ---
        diskChart.data.labels = labels;
        diskChart.data.datasets[0].data = d.disk_read_kb_s;
        diskChart.data.datasets[1].data = d.disk_write_kb_s;
        diskChart.update();
        document.getElementById('diskVal').textContent =
            'Read:' + last(d.disk_read_kb_s) + ' Write:' + last(d.disk_write_kb_s);

        // --- Response Time ---
        rtChart.data.labels = labels;
        rtChart.data.datasets[0].data = d.response_time_ms;
        rtChart.update();
        document.getElementById('rtVal').textContent = 'Latency: ' + last(d.response_time_ms).toFixed(1) + 'ms';

        // --- Row Count ---
        rowChart.data.labels = labels;
        rowChart.data.datasets[0].data = d.row_count;
        rowChart.update();
        document.getElementById('rowVal').textContent = 'Rows: ' + last(d.row_count).toLocaleString();

        // --- Transactions / Locks ---
        txChart.data.labels = labels;
        txChart.data.datasets[0].data = d.active_transactions;
        txChart.data.datasets[1].data = d.lock_waiters;
        txChart.update();
        document.getElementById('txVal').textContent =
            'Active TX:' + last(d.active_transactions) + ' Lock Waiters:' + last(d.lock_waiters);

        document.getElementById('mode').textContent = d.mode || '-';
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
    } catch (e) {
        document.getElementById('lastUpdate').textContent = 'fetch error';
    }
}

fetchData();
setInterval(fetchData, 2000);

// --- 다운로드 기능 ---
const chartMap = {
    cpuChart: () => cpuChart,
    memChart: () => memChart,
    diskChart: () => diskChart,
    rtChart: () => rtChart,
    rowChart: () => rowChart,
    txChart: () => txChart
};

function downloadChart(chartId, name) {
    const chart = chartMap[chartId]();
    const url = chart.toBase64Image('image/png', 1);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'cubrid_' + name + '_' + new Date().toISOString().slice(0,19).replace(/[T:]/g,'') + '.png';
    a.click();
}

function exportAllCharts() {
    const names = [
        ['cpuChart','cpu'], ['memChart','memory'], ['diskChart','disk_io'],
        ['rtChart','response_time'], ['rowChart','row_count'], ['txChart','transactions']
    ];
    names.forEach(function(pair) { downloadChart(pair[0], pair[1]); });
}

function exportExcel() { window.location.href = '/monitor/export/excel'; }
function exportCSV() { window.location.href = '/monitor/export/csv'; }
</script>
</body>
</html>
